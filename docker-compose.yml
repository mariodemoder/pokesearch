version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pokeapp_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      LOG_CHANNEL: stack
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pokeapp
      DB_USERNAME: pokeapp
      DB_PASSWORD: pokeapp
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      POKEAPI_BASE_URL: https://pokeapi.co/api/v2
      POKEAPI_TIMEOUT: 5
      POKEAPI_RETRY_TIMES: 2
      POKEAPI_RETRY_SLEEP_MS: 200
      POKEMON_CACHE_TTL_SECONDS: 180
      POKEMON_API_RATE_LIMIT_PER_MINUTE: 30
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: pokeapp_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pokeapp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  db:
    image: mysql:8.4
    container_name: pokeapp_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pokeapp
      MYSQL_USER: pokeapp
      MYSQL_PASSWORD: pokeapp
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
